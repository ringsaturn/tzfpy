name: Publish Simple Index

on:
  push:
    paths:
      - docs/release_wheels.csv
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-simple-index:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Seed metadata CSV from current Pages deployment
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p docs
          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          url="https://${owner}.github.io/${repo}/docs/release_wheels.csv"
          tmp_csv="$(mktemp)"
          if curl --fail --location --silent --show-error "$url" -o "$tmp_csv"; then
            mv "$tmp_csv" docs/release_wheels.csv
            echo "Loaded metadata CSV from ${url}"
          else
            rm -f "$tmp_csv"
            echo "No remote CSV found, keeping local docs/release_wheels.csv if present."
          fi
      - name: Build simple index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          uv run scripts/build_simple_index.py \
            --repository "$GITHUB_REPOSITORY" \
            --package tzfpy \
            --min-tag v0.11.0 \
            --csv docs/release_wheels.csv \
            --output site
      - name: Verify Pages artifact has no wheel files
        run: |
          set -euo pipefail
          if find site -type f -name '*.whl' | grep -q .; then
            echo "site contains .whl files, aborting."
            exit 1
          fi
          test -f site/docs/release_wheels.csv
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
