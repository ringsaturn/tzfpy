name: Sync PyPI Versions to GitHub Releases

on:
  workflow_dispatch:
    inputs:
      package:
        description: PyPI package name.
        required: true
        default: tzfpy
        type: string
      versions:
        description: Version list separated by comma, space, or newline. Leave empty to sync all versions from PyPI.
        required: false
        default: ""
        type: string
      tag_prefix:
        description: Tag prefix for release tags.
        required: false
        default: v
        type: string
      include_prerelease:
        description: Include pre-release versions when versions is empty.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: sync-pypi-releases-${{ github.repository }}
  cancel-in-progress: false

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    outputs:
      count: ${{ steps.resolve.outputs.count }}
      versions_json: ${{ steps.resolve.outputs.versions_json }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Resolve versions from PyPI
        id: resolve
        env:
          INPUT_PACKAGE: ${{ inputs.package }}
          INPUT_VERSIONS: ${{ inputs.versions }}
          INPUT_INCLUDE_PRERELEASE: ${{ inputs.include_prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --package "$INPUT_PACKAGE"
            --versions "$INPUT_VERSIONS"
            --github-output "$GITHUB_OUTPUT"
          )
          if [ "$INPUT_INCLUDE_PRERELEASE" = "true" ]; then
            args+=(--include-prerelease)
          fi
          python3 scripts/resolve_pypi_versions.py "${args[@]}"

  create-releases:
    runs-on: ubuntu-latest
    needs: resolve-versions
    if: ${{ needs.resolve-versions.outputs.count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.resolve-versions.outputs.versions_json) }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check tag existence
        id: check_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_prefix }}${{ matrix.version }}
        shell: bash
        run: |
          set -euo pipefail
          if output="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG_NAME" 2>&1)"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            if echo "$output" | grep -qi "Not Found"; then
              echo "exists=false" >> "$GITHUB_OUTPUT"
              echo "Tag not found, skip release creation: $TAG_NAME"
            else
              echo "$output"
              exit 1
            fi
          fi

      - name: Fetch files from PyPI
        id: fetch_files
        if: ${{ steps.check_tag.outputs.exists == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/fetch_pypi_release_files.py \
            --package "${{ inputs.package }}" \
            --version "${{ matrix.version }}" \
            --output-dir "dist/pypi/${{ matrix.version }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Check release existence
        id: check_release
        if: ${{ steps.check_tag.outputs.exists == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_prefix }}${{ matrix.version }}
        shell: bash
        run: |
          set -euo pipefail
          if output="$(gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" 2>&1)"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release already exists: $TAG_NAME"
          else
            if echo "$output" | grep -qi "release not found"; then
              echo "exists=false" >> "$GITHUB_OUTPUT"
            else
              echo "$output"
              exit 1
            fi
          fi

      - name: Select missing files for existing release
        id: missing_files
        if: ${{ steps.check_tag.outputs.exists == 'true' && steps.check_release.outputs.exists == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag_prefix }}${{ matrix.version }}
          FETCHED_FILES: ${{ steps.fetch_files.outputs.files }}
        shell: bash
        run: |
          set -euo pipefail
          files_file="$(mktemp)"
          printf '%s\n' "$FETCHED_FILES" > "$files_file"
          python3 scripts/filter_missing_release_files.py \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$TAG_NAME" \
            --files-file "$files_file" \
            --github-output "$GITHUB_OUTPUT"

      - name: Detect prerelease flag
        id: meta
        if: ${{ steps.check_tag.outputs.exists == 'true' && steps.check_release.outputs.exists == 'false' }}
        env:
          VERSION: ${{ matrix.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$VERSION" =~ (^|[._-])(a|b|rc|alpha|beta|dev|pre|preview)[0-9]*($|[._-]) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create new GitHub release with files
        if: ${{ steps.check_tag.outputs.exists == 'true' && steps.check_release.outputs.exists == 'false' }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.tag_prefix }}${{ matrix.version }}
          name: ${{ inputs.package }} ${{ matrix.version }}
          body: |
            Synced from PyPI package `${{ inputs.package }}`.
            Version: `${{ matrix.version }}`
            PyPI: https://pypi.org/project/${{ inputs.package }}/${{ matrix.version }}/
          files: ${{ steps.fetch_files.outputs.files }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: false
          make_latest: false

      - name: Upload files to existing GitHub release
        if: ${{ steps.check_tag.outputs.exists == 'true' && steps.check_release.outputs.exists == 'true' && steps.missing_files.outputs.missing_count != '0' }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.tag_prefix }}${{ matrix.version }}
          files: ${{ steps.missing_files.outputs.missing_files }}
          fail_on_unmatched_files: true
          make_latest: false

      - name: Skip upload when all files already exist
        if: ${{ steps.check_tag.outputs.exists == 'true' && steps.check_release.outputs.exists == 'true' && steps.missing_files.outputs.missing_count == '0' }}
        shell: bash
        run: echo "All files already exist in release, skip upload."
